<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-400">Roles</h1>
    <!--<button
      type="button"
      (click)="openCreate()"
      class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
    >
      + Crear rol
    </button>-->
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <p *ngIf="items.length === 0" class="p-6 text-center text-gray-500 dark:text-gray-400">Sin roles</p>

    <ng-container *ngIf="items.length > 0">
      <div class="xl:hidden border-b border-gray-200 bg-gray-50 px-4 py-3 dark:border-gray-700 dark:bg-gray-900/50">
        <label for="roles-sort" class="mb-2 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-400">
          Ordenar por
        </label>
        <select
          id="roles-sort"
          name="rolesSort"
          class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:focus:border-blue-500 dark:focus:ring-blue-500"
          [ngModel]="sortSelectValue"
          (ngModelChange)="onSortSelect($event)"
        >
          <option value="id:asc">ID — ascendente</option>
          <option value="id:desc">ID — descendente</option>
          <option value="descripcion:asc">Descripción — A a Z</option>
          <option value="descripcion:desc">Descripción — Z a A</option>
        </select>
      </div>

      <ul class="xl:hidden divide-y divide-gray-200 dark:divide-gray-700" role="list">
        <li *ngFor="let r of items" class="bg-white px-4 py-4 dark:bg-gray-800">
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between gap-3">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">ID</span>
              <span class="text-sm tabular-nums text-gray-700 dark:text-gray-300">{{ r.id }}</span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">Descripción</span>
              <span class="text-sm font-medium text-gray-900 dark:text-white">{{ r.descripcion }}</span>
            </div>
          </div>
        </li>
      </ul>

      <table class="hidden w-full text-sm text-left text-gray-500 dark:text-gray-400 xl:table">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr>
            <th
              scope="col"
              class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
              (click)="onSort('id')"
            >
              <span class="inline-flex items-center"
                >ID <app-liga-sort-indicator [active]="sortBy === 'id'" [order]="sortOrder"></app-liga-sort-indicator
              ></span>
            </th>
            <th
              scope="col"
              class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
              (click)="onSort('descripcion')"
            >
              <span class="inline-flex items-center"
                >Descripción
                <app-liga-sort-indicator [active]="sortBy === 'descripcion'" [order]="sortOrder"></app-liga-sort-indicator
              ></span>
            </th>
            <th scope="col" class="px-6 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let r of items"
            class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
          >
            <td class="px-6 py-4 text-gray-500">{{ r.id }}</td>
            <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ r.descripcion }}</td>
            <td class="px-6 py-4 text-right">
              <!--
            <button type="button" (click)="remove(r)" class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-2">
              Eliminar
            </button>-->
            </td>
          </tr>
        </tbody>
      </table>
    </ng-container>
  </div>
  <app-liga-pagination [page]="page" [total]="total" [limit]="limit" (prev)="prev()" (next)="next()"></app-liga-pagination>
</div>

<div *ngIf="modal" [class]="lm.backdrop">
  <div [class]="lm.panelSm" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">Nuevo rol</h3>
    <form [formGroup]="form" (ngSubmit)="save()" class="space-y-3">
      <fieldset class="border-0 p-0 m-0 min-w-0" [disabled]="loading">
        <input formControlName="descripcion" placeholder="Descripción" [class]="lm.field" />
      </fieldset>
      <div class="flex justify-end mt-4">
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="button"
          (click)="modal = false"
          [class]="lm.btnSecondary"
          [disabled]="loading"
        >
          Cancelar
        </button>
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="submit"
          [class]="lm.btnPrimary"
          [disabled]="loading"
        >
          <span *ngIf="!loading">Crear</span>
          <span *ngIf="loading">Guardando…</span>
        </button>
      </div>
    </form>
  </div>
</div>
