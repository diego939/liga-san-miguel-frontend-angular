<div class="space-y-4">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-400">Suspensiones</h1>
  <div
    class="p-4 bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-wrap gap-3 items-center"
  >
    <label class="flex items-center gap-2 text-sm text-gray-900 dark:text-gray-400">
      <input type="checkbox" [(ngModel)]="soloActivas" (change)="apply()" />
      Solo activas (partidos restantes &gt; 0)
    </label>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600 whitespace-nowrap"
            (click)="onSort('id')"
          >
            <span class="inline-flex items-center"
              ># <app-liga-sort-indicator [active]="sortBy === 'id'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th scope="col" class="px-6 py-3">Jugador</th>
          <th scope="col" class="px-6 py-3">Torneo</th>
          <th scope="col" class="px-6 py-3">Motivo</th>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('partidosRestantes')"
          >
            <span class="inline-flex items-center"
              >Partidos restantes
              <app-liga-sort-indicator
                [active]="sortBy === 'partidosRestantes'"
                [order]="sortOrder"
              ></app-liga-sort-indicator
            ></span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let s of items"
          class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
        >
          <td class="px-6 py-4 text-gray-500">{{ s.id }}</td>
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">
            {{ s.jugador?.apellido }}, {{ s.jugador?.nombre }}
          </td>
          <td class="px-6 py-4">{{ s.torneo?.nombre }}</td>
          <td class="px-6 py-4">{{ s.motivo }}</td>
          <td class="px-6 py-4">{{ s.partidosRestantes }}</td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500">Sin suspensiones</p>
    <p *ngIf="loading" class="p-6 text-center">Cargando…</p>
  </div>
  <app-liga-pagination [page]="page" [total]="total" [limit]="limit" (prev)="prev()" (next)="next()"></app-liga-pagination>
</div>
