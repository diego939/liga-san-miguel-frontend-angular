<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-400">Equipos en el torneo</h2>
    <button
      type="button"
      (click)="openModal()"
      class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5"
    >
      + Agregar club
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th scope="col" class="px-6 py-3">Club</th>
          <th scope="col" class="px-6 py-3">Jugadores activos</th>
          <th scope="col" class="px-6 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let e of items"
          class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
        >
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ e.club?.nombre }}</td>
          <td class="px-6 py-4">{{ e.jugadoresInscriptosActivos ?? '—' }}</td>
          <td class="px-6 py-4 text-right space-x-2">
            <button
              type="button"
              (click)="inscripciones(e)"
              class="font-medium text-blue-600 dark:text-blue-500 hover:underline text-sm"
            >
              Inscripciones
            </button>
            <button type="button" (click)="quitar(e)" class="font-medium text-red-600 hover:underline text-sm">Quitar</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500">No hay equipos aún</p>
    <p *ngIf="loading" class="p-6 text-center">Cargando…</p>
  </div>
</div>

<div *ngIf="modal" [class]="lm.backdrop">
  <div [class]="lm.panelSm" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">Asociar club</h3>
    <form [formGroup]="form" (ngSubmit)="asociar()" class="space-y-4">
      <label [class]="lm.label">Club</label>
      <select formControlName="clubId" [class]="lm.field">
        <option [ngValue]="0">Seleccionar club…</option>
        <option *ngFor="let c of clubs" [ngValue]="c.id">{{ c.nombre }}</option>
      </select>
      <div class="flex justify-end gap-2">
        <button type="button" (click)="modal = false" [class]="lm.btnSecondary">Cancelar</button>
        <button type="submit" [class]="lm.btnPrimary">Agregar</button>
      </div>
    </form>
  </div>
</div>
