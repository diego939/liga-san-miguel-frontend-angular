<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-400">Equipos en el torneo</h2>
    <button
      *appIfNotOperador
      type="button"
      (click)="openModal()"
      class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5"
    >
      + Agregar club
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <p *ngIf="loading && items.length === 0" class="p-6 text-center text-gray-600 dark:text-gray-400">Cargando…</p>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500 dark:text-gray-400">No hay equipos aún</p>

    <ng-container *ngIf="items.length > 0">
      <ul class="xl:hidden divide-y divide-gray-200 dark:divide-gray-700" role="list">
        <li *ngFor="let e of items" class="bg-white px-4 py-4 dark:bg-gray-800">
          <div class="flex flex-col gap-3">
            <div class="flex flex-col gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">Club</span>
              <span class="text-sm font-medium text-gray-900 dark:text-white">{{ e.club.nombre }}</span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400"
                >Jugadores activos</span
              >
              <span class="text-sm tabular-nums text-gray-800 dark:text-gray-200">{{ e.jugadoresInscriptosActivos ?? '—' }}</span>
            </div>
            <div class="flex flex-wrap justify-end gap-2 pt-1">
              <button
                type="button"
                (click)="inscripciones(e)"
                class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-3 py-1 text-sm"
              >
                Inscripciones
              </button>
              <button
                *appIfNotOperador
                type="button"
                (click)="quitar(e)"
                class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-3 py-1 text-sm"
              >
                Quitar
              </button>
            </div>
          </div>
        </li>
      </ul>

      <table class="hidden w-full text-sm text-left text-gray-500 dark:text-gray-400 xl:table">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr>
            <th scope="col" class="px-6 py-3">Club</th>
            <th scope="col" class="px-6 py-3">Jugadores activos</th>
            <th scope="col" class="px-6 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let e of items"
            class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
          >
            <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ e.club.nombre }}</td>
            <td class="px-6 py-4">{{ e.jugadoresInscriptosActivos ?? '—' }}</td>
            <td class="px-6 py-4 text-right space-x-2">
              <button
                type="button"
                (click)="inscripciones(e)"
                class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-2 text-sm"
              >
                Inscripciones
              </button>
              <button *appIfNotOperador type="button" (click)="quitar(e)" class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-2 text-sm">Quitar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </ng-container>
    <p *ngIf="loading && items.length > 0" class="p-3 text-center text-sm text-gray-500 dark:text-gray-400">Cargando…</p>
  </div>
</div>

<div *ngIf="modal" [class]="lm.backdrop">
  <div [class]="lm.panelSm" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">Asociar club</h3>
    <form [formGroup]="form" (ngSubmit)="asociar()" class="space-y-4">
      <fieldset class="border-0 p-0 m-0 min-w-0" [disabled]="saving">
        <label [class]="lm.label">Club</label>
        <select formControlName="clubId" [class]="lm.field">
          <option [ngValue]="0">Seleccionar club…</option>
          <option *ngFor="let c of clubs" [ngValue]="c.id">{{ c.nombre }}</option>
        </select>
      </fieldset>
      <div class="flex justify-end mt-4">
        <button
          class="mx-1 cursor-pointer dark:text-white text-gray-900 bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="button"
          (click)="closeModal()"
          [class]="lm.btnSecondary"
          [disabled]="saving"
        >
          Cancelar
        </button>
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="submit"
          [class]="lm.btnPrimary"
          [disabled]="saving"
        >
          <span *ngIf="!saving">Agregar</span>
          <span *ngIf="saving">Guardando…</span>
        </button>
      </div>
    </form>
  </div>
</div>
