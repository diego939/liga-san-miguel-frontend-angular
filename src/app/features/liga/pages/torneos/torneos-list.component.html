<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-400">Torneos</h1>
    <button *appIfNotOperador type="button" (click)="openCreate()" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-700 rounded-lg hover:bg-blue-800">+ Crear torneo</button>
  </div>
  <div
    class="p-4 bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-wrap gap-3 items-end"
  >
    <input
      [(ngModel)]="filterQ"
      type="search"
      placeholder="Buscar…"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white flex-1 max-w-md"
    />
    <button
      type="button"
      (click)="apply()"
      class="text-white bg-gray-700 hover:bg-gray-800 font-medium rounded-lg text-sm px-4 py-2.5 cursor-pointer focus:outline-none focus:ring-4 focus:ring-gray-300 dark:bg-gray-600 dark:hover:bg-gray-700 dark:focus:ring-gray-800"
    >
      Buscar
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('nombre')"
          >
            <span class="inline-flex items-center"
              >Nombre
              <app-liga-sort-indicator [active]="sortBy === 'nombre'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('categoria')"
          >
            <span class="inline-flex items-center"
              >Categoría
              <app-liga-sort-indicator [active]="sortBy === 'categoria'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('formato')"
          >
            <span class="inline-flex items-center"
              >Formato
              <app-liga-sort-indicator [active]="sortBy === 'formato'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('fechaInicio')"
          >
            <span class="inline-flex items-center"
              >Inicio
              <app-liga-sort-indicator [active]="sortBy === 'fechaInicio'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('fechaFin')"
          >
            <span class="inline-flex items-center"
              >Fin <app-liga-sort-indicator [active]="sortBy === 'fechaFin'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th scope="col" class="px-6 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let t of items"
          class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
        >
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ t.nombre }}</td>
          <td class="px-6 py-4">{{ t.categoria }}</td>
          <td class="px-6 py-4">{{ t.formato }}</td>
          <td class="px-6 py-4">{{ formatDate(t.fechaInicio) }}</td>
          <td class="px-6 py-4">{{ formatDate(t.fechaFin) }}</td>
          <td class="px-6 py-4 text-right space-x-2">
            <button type="button" (click)="gestionar(t)" class="font-medium text-green-700 dark:text-green-500 cursor-pointer decoration-none border border-green-500 rounded-full px-2">
              Ver detalles
            </button>
            <button
              *appIfNotOperador
              type="button"
              (click)="openEdit(t, $event)"
              class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-2"
            >
              Editar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500">Sin torneos</p>
    <p *ngIf="loading" class="p-6 text-center">Cargando…</p>
  </div>
  <app-liga-pagination [page]="page" [total]="total" [limit]="limit" (prev)="prevPage()" (next)="nextPage()"></app-liga-pagination>
</div>

<div *ngIf="modalOpen" [class]="lm.backdropScroll">
  <div [class]="lm.panelLgScroll" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">{{ editing ? 'Editar torneo' : 'Nuevo torneo' }}</h3>
    <form [formGroup]="form" (ngSubmit)="save()" class="space-y-3">
      <fieldset class="space-y-3 border-0 p-0 m-0 min-w-0" [disabled]="saving">
        <input formControlName="nombre" placeholder="Nombre" [class]="lm.field" />
        <input formControlName="categoria" placeholder="Categoría" [class]="lm.field" />
        <input formControlName="formato" placeholder="Formato" [class]="lm.field" />
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label [class]="lm.labelMuted">Inicio</label>
            <input type="date" formControlName="fechaInicio" [class]="lm.field" />
          </div>
          <div>
            <label [class]="lm.labelMuted">Fin</label>
            <input type="date" formControlName="fechaFin" [class]="lm.field" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label [class]="lm.labelMuted">Límite foráneos</label>
            <input type="number" formControlName="limiteForaneos" [class]="lm.field" />
          </div>
          <div>
            <label [class]="lm.labelMuted">Máx. jugadores por equipo</label>
            <input type="number" formControlName="maxJugadores" [class]="lm.field" />
          </div>
        </div>
      </fieldset>
      <div class="flex justify-end mt-4">
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="button"
          (click)="close()"
          [class]="lm.btnSecondary"
          [disabled]="saving"
        >
          Cancelar
        </button>
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="submit"
          [class]="lm.btnPrimary"
          [disabled]="saving"
        >
          <span *ngIf="!saving">Guardar</span>
          <span *ngIf="saving">Guardando…</span>
        </button>
      </div>
    </form>
  </div>
</div>
