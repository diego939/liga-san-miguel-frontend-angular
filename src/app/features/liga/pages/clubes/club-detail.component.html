<div *ngIf="club as c" class="space-y-6">
  <nav class="text-sm text-gray-500">
    <a routerLink="/pages/clubes" class="hover:underline">Clubes</a> / <span class="text-gray-900 dark:text-gray-400">{{ c.nombre }}</span>
  </nav>
  <h1 class="text-2xl font-bold dark:text-gray-400 ">{{ c.nombre }}</h1>
  <!--<p class="text-sm text-gray-600 dark:text-gray-400">Logo: {{ c.logo || '—' }}</p>-->

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-400">Personal</h2>
    <button
      *appIfNotOperador
      type="button"
      (click)="openAddPer()"
      class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5"
    >
      + Agregar personal
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th scope="col" class="px-6 py-3">Tipo</th>
          <th scope="col" class="px-6 py-3">Nombre</th>
          <th scope="col" class="px-6 py-3">DNI</th>
          <th scope="col" class="px-6 py-3">Teléfono</th>
          <th *appIfNotOperador scope="col" class="px-6 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let p of personal"
          class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
        >
          <td class="px-6 py-4">{{ p.tipo }}</td>
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ p.nombre }}</td>
          <td class="px-6 py-4">{{ p.dni || '—' }}</td>
          <td class="px-6 py-4">{{ p.telefono || '—' }}</td>
          <td *appIfNotOperador class="px-6 py-4 text-right space-x-3">
            <button type="button" (click)="openEditPer(p)" class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-2">
              Editar
            </button>
            <button type="button" (click)="deletePer(p)" class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-2">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="personal.length === 0" class="p-6 text-center text-gray-500">Sin personal cargado</p>
  </div>
</div>
<p *ngIf="loading" class="p-8 text-center">Cargando…</p>

<div *ngIf="modalPer" [class]="lm.backdrop">
  <div [class]="lm.panelSm" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">{{ editingPer ? 'Editar personal' : 'Nuevo personal' }}</h3>
    <form [formGroup]="perForm" (ngSubmit)="savePer()" class="space-y-3">
      <fieldset class="space-y-3 border-0 p-0 m-0 min-w-0" [disabled]="savingPer">
        <div>
          <label [class]="lm.label">Tipo</label>
          <input formControlName="tipo" placeholder="Ej. DELEGADO" [class]="lm.field" />
        </div>
        <div>
          <label [class]="lm.label">Nombre</label>
          <input formControlName="nombre" [class]="lm.field" />
        </div>
        <div>
          <label [class]="lm.label">DNI <span class="font-normal text-gray-500">(opcional)</span></label>
          <input formControlName="dni" [class]="lm.field" inputmode="numeric" autocomplete="off" />
        </div>
        <div>
          <label [class]="lm.label">Teléfono <span class="font-normal text-gray-500">(opcional)</span></label>
          <input formControlName="telefono" type="tel" [class]="lm.field" autocomplete="off" />
        </div>
      </fieldset>
      <div class="flex justify-end mt-4">
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="button"
          (click)="closePerModal()"
          [class]="lm.btnSecondary"
          [disabled]="savingPer"
        >
          Cancelar
        </button>
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="submit"
          [class]="lm.btnPrimary"
          [disabled]="savingPer"
        >
          <span *ngIf="!savingPer">Guardar</span>
          <span *ngIf="savingPer">Guardando…</span>
        </button>
      </div>
    </form>
  </div>
</div>
