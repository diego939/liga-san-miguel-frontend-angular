<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-400">Clubes</h1>
    <button *appIfNotOperador type="button" (click)="openCreate()" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-700 rounded-lg hover:bg-blue-800">+ Crear club</button>
  </div>
  <div
    class="p-4 bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-wrap gap-3 items-end"
  >
    <input
      [(ngModel)]="filterQ"
      type="search"
      placeholder="Buscar nombre"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white flex-1 max-w-xs"
    />
    <button
      type="button"
      (click)="apply()"
      class="text-white bg-gray-700 hover:bg-gray-800 font-medium rounded-lg text-sm px-4 py-2.5 cursor-pointer focus:outline-none focus:ring-4 focus:ring-gray-300 dark:bg-gray-600 dark:hover:bg-gray-700 dark:focus:ring-gray-800"
    >
      Buscar
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <p *ngIf="loading && items.length === 0" class="p-6 text-center text-gray-600 dark:text-gray-400">Cargando…</p>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500 dark:text-gray-400">Sin clubes</p>

    <ng-container *ngIf="items.length > 0">
      <div class="xl:hidden border-b border-gray-200 bg-gray-50 px-4 py-3 dark:border-gray-700 dark:bg-gray-900/50">
        <label
          for="clubes-sort"
          class="mb-2 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-400"
        >
          Ordenar por
        </label>
        <select
          id="clubes-sort"
          name="clubesSort"
          class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:focus:border-blue-500 dark:focus:ring-blue-500"
          [ngModel]="sortSelectValue"
          (ngModelChange)="onSortSelect($event)"
        >
          <option value="nombre:asc">Nombre — A a Z</option>
          <option value="nombre:desc">Nombre — Z a A</option>
          <option value="id:asc">ID — ascendente</option>
          <option value="id:desc">ID — descendente</option>
        </select>
      </div>

      <ul class="xl:hidden divide-y divide-gray-200 dark:divide-gray-700" role="list">
        <li
          *ngFor="let c of items"
          title="Ver Personal (Delegados, etc.)"
          class="cursor-pointer bg-white px-4 py-4 hover:bg-gray-50 dark:bg-gray-800 dark:hover:bg-gray-700/50"
          (click)="goDetail(c)"
        >
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between gap-3">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">ID</span>
              <span class="text-sm tabular-nums text-gray-700 dark:text-gray-300">{{ c.id }}</span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">Nombre</span>
              <span class="text-sm font-medium text-gray-900 dark:text-white">{{ c.nombre }}</span>
            </div>
            <div class="flex flex-wrap justify-end gap-2 pt-1" (click)="$event.stopPropagation()">
              <button
                type="button"
                title="Ver Personal (Delegados, etc.)"
                (click)="goDetail(c)"
                class="font-medium text-green-600 dark:text-green-500 cursor-pointer decoration-none border border-green-500 rounded-full px-3 py-1 text-sm"
              >
                Ver Personal
              </button>
              <button
                *appIfNotOperador
                type="button"
                title="Editar"
                (click)="openEdit(c, $event)"
                class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-3 py-1 text-sm"
              >
                Editar
              </button>
              <button
                *appIfNotOperador
                type="button"
                title="Eliminar"
                (click)="remove(c, $event)"
                class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-3 py-1 text-sm"
              >
                Eliminar
              </button>
            </div>
          </div>
        </li>
      </ul>

      <table class="hidden w-full text-sm text-left text-gray-500 dark:text-gray-400 xl:table">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr>
            <th
              scope="col"
              class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
              (click)="onSort('nombre')"
            >
              <span class="inline-flex items-center"
                >Nombre
                <app-liga-sort-indicator [active]="sortBy === 'nombre'" [order]="sortOrder"></app-liga-sort-indicator
              ></span>
            </th>
            <th
              scope="col"
              class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600 whitespace-nowrap"
              (click)="onSort('id')"
            >
              <span class="inline-flex items-center"
                >ID <app-liga-sort-indicator [active]="sortBy === 'id'" [order]="sortOrder"></app-liga-sort-indicator
              ></span>
            </th>
            <th scope="col" class="px-6 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let c of items"
            title="Ver Personal (Delegados, etc.)"
            class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 cursor-pointer"
            (click)="goDetail(c)"
          >
            <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ c.nombre }}</td>
            <td class="px-6 py-4 text-gray-500">{{ c.id }}</td>
            <td class="px-6 py-4 text-right space-x-2" (click)="$event.stopPropagation()">
              <button
                type="button"
                title="Ver Personal (Delegados, etc.)"
                (click)="goDetail(c)"
                class="font-medium text-green-600 dark:text-green-500 cursor-pointer decoration-none border border-green-500 rounded-full px-2"
              >
                Ver Personal
              </button>
              <button
                *appIfNotOperador
                type="button"
                title="Editar"
                (click)="openEdit(c, $event)"
                class="font-medium text-blue-600 dark:text-blue-500 cursor-pointer decoration-none border border-blue-500 rounded-full px-2"
              >
                Editar
              </button>
              <button
                *appIfNotOperador
                type="button"
                title="Eliminar"
                (click)="remove(c, $event)"
                class="font-medium text-red-600 cursor-pointer decoration-none border border-red-500 rounded-full px-2"
              >
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </ng-container>
    <p *ngIf="loading && items.length > 0" class="p-3 text-center text-sm text-gray-500 dark:text-gray-400">Cargando…</p>
  </div>
  <app-liga-pagination [page]="page" [total]="total" [limit]="limit" (prev)="prevPage()" (next)="nextPage()"></app-liga-pagination>
</div>

<div *ngIf="modalOpen" [class]="lm.backdrop">
  <div [class]="lm.panelMd" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">{{ editing ? 'Editar club' : 'Nuevo club' }}</h3>
    <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">
      <fieldset class="space-y-4 border-0 p-0 m-0 min-w-0" [disabled]="saving">
        <div>
          <label [class]="lm.label">Nombre</label>
          <input formControlName="nombre" [class]="lm.field" />
        </div>
        <!--<div>
          <label [class]="lm.label">Logo (URL)</label>
          <input formControlName="logo" [class]="lm.field" />
        </div>-->
      </fieldset>
      <div class="flex justify-end mt-4">
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="button"
          (click)="close()"
          [class]="lm.btnSecondary"
          [disabled]="saving"
        >
          Cancelar
        </button>
        <button
          class="mx-1 cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700"
          type="submit"
          [class]="lm.btnPrimary"
          [disabled]="saving"
        >
          <span *ngIf="!saving">Guardar</span>
          <span *ngIf="saving">Guardando…</span>
        </button>
      </div>
    </form>
  </div>
</div>
