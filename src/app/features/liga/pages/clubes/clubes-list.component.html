<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-400">Clubes</h1>
    <button type="button" (click)="openCreate()" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-700 rounded-lg hover:bg-blue-800">+ Crear club</button>
  </div>
  <div
    class="p-4 bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-wrap gap-3 items-end"
  >
    <input
      [(ngModel)]="filterQ"
      placeholder="Buscar nombre"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white flex-1 max-w-xs"
    />
    <button
      type="button"
      (click)="apply()"
      class="text-white bg-gray-700 hover:bg-gray-800 font-medium rounded-lg text-sm px-4 py-2.5"
    >
      Buscar
    </button>
  </div>
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th
            scope="col"
            class="px-6 py-3 cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-600"
            (click)="onSort('nombre')"
          >
            <span class="inline-flex items-center"
              >Nombre
              <app-liga-sort-indicator [active]="sortBy === 'nombre'" [order]="sortOrder"></app-liga-sort-indicator
            ></span>
          </th>
          <th scope="col" class="px-6 py-3">Logo</th>
          <th scope="col" class="px-6 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let c of items"
          class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 cursor-pointer"
          (click)="goDetail(c)"
        >
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">{{ c.nombre }}</td>
          <td class="px-6 py-4">{{ c.logo || '—' }}</td>
          <td class="px-6 py-4 text-right space-x-2" (click)="$event.stopPropagation()">
            <button
              type="button"
              (click)="openEdit(c, $event)"
              class="font-medium text-blue-600 dark:text-blue-500 hover:underline"
            >
              Editar
            </button>
            <button type="button" (click)="remove(c, $event)" class="font-medium text-red-600 hover:underline">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading && items.length === 0" class="p-6 text-center text-gray-500">Sin clubes</p>
    <p *ngIf="loading" class="p-6 text-center">Cargando…</p>
  </div>
  <app-liga-pagination [page]="page" [total]="total" [limit]="limit" (prev)="prevPage()" (next)="nextPage()"></app-liga-pagination>
</div>

<div *ngIf="modalOpen" [class]="lm.backdrop" (click)="close()">
  <div [class]="lm.panelMd" (click)="$event.stopPropagation()">
    <h3 [class]="lm.titleSm">{{ editing ? 'Editar club' : 'Nuevo club' }}</h3>
    <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">
      <div>
        <label [class]="lm.label">Nombre</label>
        <input formControlName="nombre" [class]="lm.field" />
      </div>
      <div>
        <label [class]="lm.label">Logo (URL)</label>
        <input formControlName="logo" [class]="lm.field" />
      </div>
      <div class="flex justify-end gap-2">
        <button type="button" (click)="close()" [class]="lm.btnSecondary">Cancelar</button>
        <button type="submit" [class]="lm.btnPrimary">Guardar</button>
      </div>
    </form>
  </div>
</div>
